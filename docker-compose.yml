services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "${WINDOWS_VERSION:-10}"
      RAM_SIZE: "${RAM_SIZE:-8G}"
      CPU_CORES: "${CPU_CORES:-4}"
      DISK_SIZE: "${DISK_SIZE:-64G}"
      USERNAME: "${WIN_USERNAME:-admin}"
      PASSWORD: "${WIN_PASSWORD:?WIN_PASSWORD must be set in .env}"
      LANGUAGE: "${WIN_LANGUAGE:-English}"
      KEYBOARD: "${WIN_KEYBOARD:-en-US}"
      REGION: "${WIN_REGION:-en-US}"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - "${WEB_PORT:-8006}:8006"
      - "${RDP_PORT:-3389}:3389/tcp"
      - "${RDP_PORT:-3389}:3389/udp"
    volumes:
      - ./storage:/storage
      - ./oem:/oem:ro
      - ./shared:/shared
    healthcheck:
      # The dispatcher deletes /shared/install.done at the start of every
      # boot and re-creates it only after every phase succeeds. So this
      # signal reflects "current deploy is fully ready", not just
      # "the disk was provisioned once".
      test: ["CMD-SHELL", "test -f /shared/install.done"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 10m
    restart: always
    stop_grace_period: 2m
