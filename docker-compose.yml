services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "11l"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "128G"
      USERNAME: "admin"
      PASSWORD: "password"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./storage:/storage
      - ./oem:/oem
      - ./shared:/shared
    restart: always
    stop_grace_period: 2m
