; ============================================================
; PHP Configuration
; ============================================================
; This file is applied to C:\php\php.ini during setup.
; Lines starting with ; are comments and are ignored.
;
; FORMAT:
;   ini_key = value          -> Sets a php.ini directive
;   extension = ext_name     -> Enables C:\php\ext\php_ext_name.dll
;   version = X.Y.Z          -> Sets the PHP version to download
; ============================================================

; PHP version to download (must match a release on windows.php.net)
version = 8.4.8

; --- Extensions to enable ---
extension = curl
extension = mbstring
extension = openssl
extension = pdo_mysql
extension = fileinfo
extension = gd
extension = zip
extension = exif
extension = intl
extension = pdo_sqlite
extension = sqlite3
extension = soap
extension = xml
extension = bcmath

; --- php.ini directives ---
memory_limit = 512M
max_execution_time = 120
upload_max_filesize = 64M
post_max_size = 64M
max_input_vars = 5000
display_errors = Off
log_errors = On
error_log = C:\php\logs\php_errors.log
date.timezone = UTC
short_open_tag = Off
